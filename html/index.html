<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LitePipe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:92%;max-width:580px}
h1{font-size:1.8rem;color:#16c79a;margin-bottom:.4rem;font-weight:700}
.sub{color:#666;margin-bottom:1.8rem;font-size:.95rem}
form{display:flex;gap:8px}
input{flex:1;padding:14px 16px;border:1px solid #2a2a3e;border-radius:10px;background:#1a1a2e;color:#e0e0e0;font-size:16px;transition:border .2s}
input:focus{outline:none;border-color:#16c79a}
input::placeholder{color:#444}
button{padding:14px 26px;border:none;border-radius:10px;background:#16c79a;color:#0f0f1a;font-weight:700;font-size:16px;cursor:pointer;transition:background .2s}
button:hover{background:#1ad9aa}
.feat{margin-top:1.5rem;display:flex;gap:1rem;flex-wrap:wrap}
.feat span{font-size:.78rem;color:#555;background:#161628;padding:6px 12px;border-radius:6px;border:1px solid #1e1e34}
.bookmarks{margin-top:1.2rem;display:flex;gap:8px;flex-wrap:wrap}
.bookmarks a{font-size:.82rem;color:#16c79a;text-decoration:none;padding:6px 14px;border:1px solid #1e2e3e;border-radius:8px;transition:all .2s}
.bookmarks a:hover{background:#16c79a;color:#0f0f1a}
</style>
</head>
<body>
<div class="wrap">
<h1>LitePipe</h1>
<p class="sub">Lossless compression proxy — browse faster on slow connections</p>
<form onsubmit="go(event)">
<input type="text" id="url" placeholder="facebook.com, google.com, youtube.com..." autofocus>
<button type="submit">Go</button>
</form>
<div class="bookmarks" id="bookmarks"></div>
<div class="feat">
<span>Gzip L9</span>
<span>Original IP Preserved</span>
<span>Full UA Passthrough</span>
<span>Zero Quality Loss</span>
<span>Any Website</span>
</div>
</div>
<script>
function b64url(s){
return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function go(e){
e.preventDefault();
var u=document.getElementById('url').value.trim();
if(!u)return;
if(!u.match(/^https?:\/\//))u='https://'+u;
window.location.href='/browse/b64:'+b64url(u);
}
var sites=[
{label:'Facebook',url:'https://facebook.com'},
{label:'Google',url:'https://google.com'},
{label:'YouTube',url:'https://youtube.com'},
{label:'Wikipedia',url:'https://wikipedia.org'},
{label:'Reddit',url:'https://reddit.com'}
];
var bm=document.getElementById('bookmarks');
sites.forEach(function(s){
var a=document.createElement('a');
a.href='/browse/b64:'+b64url(s.url);
a.textContent=s.label;
bm.appendChild(a);
});
</script>
</body>
</html>
