version: "3.9"

services:
  litepipe:
    build: .
    container_name: litepipe
    ports:
      - "8080:80"
    environment:
      - PORT=80
      - AUTH_TOKENS=mySecretToken:lo
      - FP_CHROME=120
      - FP_FIREFOX=120
      - H2_MAX_CONNS=3
      - H1_MAX_IDLE=5
      - CONN_IDLE_TIMEOUT=60s
      - CONN_MAX_AGE=10m
      - DIAL_TIMEOUT=10s
      - CLOUDFLARED_TOKEN=
    volumes:
      - cache_data:/tmp/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  cache_data:
